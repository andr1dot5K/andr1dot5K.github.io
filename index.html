<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Таск-трекер | CSV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Верхняя панель с датой -->
  <header class="top-bar">
    <div class="date-display">
      <span class="calendar-icon">📅</span>
      <span id="currentDate">Загрузка даты...</span>
    </div>
  </header>

  <main class="container">
    <!-- Заголовок и кнопки управления -->
    <div class="header-row">
      <h1>📋 Таск-трекер</h1>
      <div class="controls">
        <button id="addTaskBtn" class="btn btn-primary">➕ Добавить задачу</button>
        <button id="downloadCsvBtn" class="btn btn-outline">⬇ Скачать CSV</button>
      </div>
    </div>

    <!-- Таблица задач -->
    <div class="table-wrapper">
      <table id="taskTable">
        <thead>
          <tr>
            <th>Продукт</th>
            <th>Описание</th>
            <th>Что сделать</th>
            <th>Что сделано</th>
            <th>Комментарий</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="taskTableBody">
          <!-- Задачи вставятся через JS -->
        </tbody>
      </table>
      <div id="emptyMessage" class="empty-message" style="display: none;">
        Нет задач. Нажмите «Добавить задачу», чтобы создать первую.
      </div>
    </div>
  </main>

  <!-- Модальное окно для добавления/редактирования задачи -->
  <div id="taskModal" class="modal-overlay" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Новая задача</h2>
        <button id="closeModalBtn" class="btn-close">&times;</button>
      </div>
      <form id="taskForm">
        <input type="hidden" id="taskIndex" value="-1">
        <div class="form-group">
          <label for="product">Продукт <span class="required">*</span></label>
          <input type="text" id="product" required placeholder="Название продукта">
        </div>
        <div class="form-group">
          <label for="description">Описание</label>
          <input type="text" id="description" placeholder="Краткое описание задачи">
        </div>
        <div class="form-group">
          <label for="todo">Что сделать</label>
          <textarea id="todo" rows="3" placeholder="Подробное описание задачи"></textarea>
        </div>
        <div class="form-group">
          <label for="done">Что сделано</label>
          <textarea id="done" rows="3" placeholder="Что уже выполнено"></textarea>
        </div>
        <div class="form-group">
          <label for="comment">Комментарий</label>
          <textarea id="comment" rows="2" placeholder="Дополнительные заметки"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" id="cancelBtn" class="btn btn-secondary">Отмена</button>
          <button type="submit" class="btn btn-primary">💾 Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
